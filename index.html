<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o seu Prêmio 🎁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); /* Degradê romântico */
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #d90429;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .subtitulo {
            color: #666;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Grid das Caixas */
        .caixas-grid {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 20px;
        }

        .caixa {
            background: #f8f9fa;
            border: 2px dashed #ff758c;
            border-radius: 15px;
            padding: 20px 10px;
            cursor: pointer;
            width: 30%;
            transition: all 0.3s ease;
        }

        .caixa:hover {
            transform: translateY(-10px);
            background: #ffe6e9;
            border-color: #d90429;
            box-shadow: 0 10px 20px rgba(217, 4, 41, 0.15);
        }

        .caixa-icone {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .caixa span {
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }

        /* Tela de Resultado (Escondida no começo) */
        #resultado {
            display: none;
            animation: abrir 0.5s ease forwards;
        }

        .premio-card {
            background: #fff0f2;
            border: 2px solid #d90429;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .premio-titulo {
            font-size: 1.4rem;
            color: #d90429;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .premio-texto {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.5;
        }

        /* Botão de Confirmação */
        .btn-resgatar {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #d90429;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(217, 4, 41, 0.3);
            transition: background 0.2s;
        }

        .btn-resgatar:hover {
            background-color: #ef233c;
        }

        @keyframes abrir {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- TELA INICIAL: ESCOLHA -->
        <div id="jogo">
            <h1>Escolha o seu prêmio de hoje à noite! 🎁</h1>
            <p class="subtitulo">Preparei 3 programações especiais. Toque em uma das caixas para revelar o seu destino...</p>
            
            <div class="caixas-grid">
                <div class="caixa" onclick="revelarPremio('A')">
                    <span class="caixa-icone">💝</span>
                    <span>Opção A</span>
                </div>
                <div class="caixa" onclick="revelarPremio('B')">
                    <span class="caixa-icone">🛍️</span>
                    <span>Opção B</span>
                </div>
                <div class="caixa" onclick="revelarPremio('C')">
                    <span class="caixa-icone">✨</span>
                    <span>Opção C</span>
                </div>
            </div>
        </div>

        <!-- TELA FINAL: RESULTADO -->
        <div id="resultado">
            <h1>Parabéns! Excelente escolha! 🎉</h1>
            <p class="subtitulo">Você abriu o seu cupom e ele já está validado. Veja o que você ganhou:</p>
            
            <div class="premio-card">
                <div class="premio-titulo" id="tituloPremio"></div>
                <div class="premio-texto" id="textoPremio"></div>
            </div>

            <button class="btn-resgatar" onclick="resgatar()">Resgatar Prêmio Agora 😏🔥</button>
        </div>
    </div>

    <script>
        // Variável global para armazenar o resumo da escolha
        let resumoPremio = "";

        function revelarPremio(opcao) {
            // Esconde a tela de escolha e mostra a de resultado
            document.getElementById('jogo').style.display = 'none';
            document.getElementById('resultado').style.display = 'block';

            const titulo = document.getElementById('tituloPremio');
            const texto = document.getElementById('textoPremio');

            // Define o prêmio e o resumo baseado na caixa clicada
            if (opcao === 'A') {
                titulo.innerHTML = "🍕 Combo \"Seu Delivery Favorito\" + Sobremesa Quente";
                texto.innerHTML = "Você ganhou uma noite totalmente livre da cozinha e da louça! Vamos pedir a sua comida favorita (pizza, japonês, hambúrguer, você escolhe), comer bem relaxados e, de sobremesa, <strong>uma sessão intensiva de muito amor, pegada e safadeza</strong> para queimar as calorias! 🔥😏";
                resumoPremio = "Comidinha boa + Sobremesa quente e safadeza 🍕🔥";
            } else if (opcao === 'B') {
                titulo.innerHTML = "⚡ Opção: Direto ao Ponto (Sem Enrolação)";
                texto.innerHTML = "Você escolheu a caixa da praticidade! Hoje não tem cansaço, não tem desculpa e nem conversinha. O prêmio é <strong>ir direto para o quarto namorar muito</strong> assim que a noite cair! 😏🍓";
                resumoPremio = "Direto ao ponto no quarto, sem enrolação! ⚡🍓";
            } else if (opcao === 'C') {
                titulo.innerHTML = "🛋️ Conchinha VIP + Upgrade Safado";
                texto.innerHTML = "Você ganhou um vale-carinho completo! Começa com cafuné assistindo sua série favorita coladinha em mim, evolui para beijos no pescoço e termina com <strong>um namoro ardente para esquentar a noite!</strong> 👩‍❤️‍👨🔥";
                resumoPremio = "Conchinha, filminho + Upgrade bem ardente! 🛋️🔥";
            }
        }

        function resgatar() {
            alert("Prêmio garantido! O seu amor já está se preparando para te dar a melhor noite possível. Te amo! ❤️");
            
            // Monta o texto incluindo o resumo dinâmico da escolha
            const textoZap = "Acabei de abrir minha caixa secreta e já escolhi meu prêmio para hoje à noite: [" + resumoPremio + "]. Trate de se preparar... 😏🔥";
            window.location.href = "https://wa.me/5584994473652?text=" + encodeURIComponent(textoZap);
        }
    </script>

</body>
</html>
